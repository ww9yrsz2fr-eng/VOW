<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>

    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080200"/>
      <stop offset="5%"   stop-color="#1A0800"/>
      <stop offset="10%"  stop-color="#6A3000"/>
      <stop offset="16%"  stop-color="#C07010"/>
      <stop offset="20%"  stop-color="#E8A820"/>
      <stop offset="24%"  stop-color="#F8D040"/>
      <stop offset="27%"  stop-color="#FFFDF0"/>
      <stop offset="30%"  stop-color="#FFFFFF"/>
      <stop offset="33%"  stop-color="#FFFDF0"/>
      <stop offset="37%"  stop-color="#F0C030"/>
      <stop offset="42%"  stop-color="#C88010"/>
      <stop offset="50%"  stop-color="#5A2800"/>
      <stop offset="57%"  stop-color="#1C0800"/>
      <stop offset="63%"  stop-color="#080200"/>
      <stop offset="68%"  stop-color="#2A1400"/>
      <stop offset="73%"  stop-color="#8A6030"/>
      <stop offset="77%"  stop-color="#C8A060"/>
      <stop offset="80%"  stop-color="#E8C888"/>
      <stop offset="83%"  stop-color="#C8A060"/>
      <stop offset="88%"  stop-color="#6A4020"/>
      <stop offset="93%"  stop-color="#2A1400"/>
      <stop offset="97%"  stop-color="#9A3018"/>
      <stop offset="100%" stop-color="#200800"/>
    </linearGradient>

    <radialGradient id="spec" cx="26%" cy="20%" r="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,255,255,1.0)"/>
      <stop offset="15%"  stop-color="rgba(255,255,240,0.85)"/>
      <stop offset="40%"  stop-color="rgba(255,250,200,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,248,180,0)"/>
    </radialGradient>

    <radialGradient id="specB" cx="78%" cy="38%" r="22%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(210,230,255,0.55)"/>
      <stop offset="40%"  stop-color="rgba(200,220,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
    </radialGradient>

    <radialGradient id="shadow" cx="56%" cy="62%" r="28%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.80)"/>
      <stop offset="40%"  stop-color="rgba(0,0,0,0.50)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <radialGradient id="shadowB" cx="62%" cy="18%" r="28%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <radialGradient id="reflect" cx="82%" cy="86%" r="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(220,90,30,0.40)"/>
      <stop offset="50%"  stop-color="rgba(200,70,20,0.18)"/>
      <stop offset="100%" stop-color="rgba(200,70,20,0)"/>
    </radialGradient>

    <radialGradient id="holeVig" cx="50%" cy="58%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="50%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.52)"/>
    </radialGradient>

    <mask id="ring">
      <circle cx="16" cy="16" r="13"  fill="white"/>
      <circle cx="16" cy="16" r="6.2" fill="black"/>
    </mask>

    <clipPath id="holeOnly">
      <circle cx="16" cy="16" r="6.2"/>
    </clipPath>

  </defs>

  <circle cx="16" cy="16" r="13" fill="url(#metal)"   mask="url(#ring)"/>
  <circle cx="16" cy="16" r="13" fill="url(#spec)"    mask="url(#ring)"/>
  <circle cx="16" cy="16" r="13" fill="url(#specB)"   mask="url(#ring)"/>
  <circle cx="16" cy="16" r="13" fill="url(#shadow)"  mask="url(#ring)"/>
  <circle cx="16" cy="16" r="13" fill="url(#shadowB)" mask="url(#ring)"/>
  <circle cx="16" cy="16" r="13" fill="url(#reflect)" mask="url(#ring)"/>

  <circle cx="16" cy="16" r="12.65"
          fill="none" stroke="rgba(255,250,210,0.65)" stroke-width="0.8"
          stroke-dasharray="14 68"
          stroke-dashoffset="-26"
          transform="rotate(-35 16 16)"/>

  <circle cx="16" cy="16" r="12.65"
          fill="none" stroke="rgba(240,210,140,0.40)" stroke-width="0.6"
          stroke-dasharray="9 73"
          stroke-dashoffset="8"
          transform="rotate(100 16 16)"/>

  <circle cx="16" cy="16" r="6.55"
          fill="none" stroke="rgba(0,0,0,0.60)" stroke-width="1.0"/>

  <circle cx="16" cy="16" r="6.55"
          fill="none" stroke="rgba(255,235,150,0.50)" stroke-width="0.8"
          stroke-dasharray="6 35"
          stroke-dashoffset="-8"
          transform="rotate(-20 16 16)"/>

  <circle cx="16" cy="16" r="6.2"
          fill="url(#holeVig)" clip-path="url(#holeOnly)"/>

</svg>
